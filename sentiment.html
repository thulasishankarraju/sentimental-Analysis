<!DOCTYPE html>
<html>

<head>
    <title>Sentiment Analysis App</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>

        body {

            background: linear-gradient(to right, #4facfe, #00f2fe);

            font-family: Arial;

            text-align: center;

            padding: 40px;
        }

        .container {

            background: white;

            width: 60%;

            margin: auto;

            padding: 30px;

            border-radius: 15px;

            box-shadow: 0px 0px 10px gray;
        }

        h1 {

            color: #333;
        }

        textarea {

            width: 90%;

            height: 150px;

            padding: 15px;

            font-size: 18px;

            border-radius: 10px;

            border: 1px solid gray;
        }

        button {

            margin-top: 20px;

            padding: 12px 25px;

            font-size: 18px;

            border: none;

            border-radius: 10px;

            background: #007bff;

            color: white;

            cursor: pointer;
        }

        button:hover {

            background: #0056b3;
        }

        .result {

            margin-top: 30px;

            background: #f5f5f5;

            padding: 20px;

            border-radius: 10px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Sentiment Analysis using TextBlob</h1>

        <form action="/analyze" method="POST">

            <textarea
                name="text"
                placeholder="Enter your review or comment..."
                required></textarea>

            <br>

            <button type="submit">
                Analyze Sentiment
            </button>

        </form>

        {% if sentiment %}

        <div class="result">

            <h2>Analysis Result</h2>

            <p><strong>Text:</strong> {{ text }}</p>

            <p><strong>Sentiment:</strong> {{ sentiment }}</p>

            <p><strong>Polarity Score:</strong> {{ polarity }}</p>

            <img src="{{ graph }}" width="400">

        </div>

        {% endif %}

    </div>

</body>
</html>
